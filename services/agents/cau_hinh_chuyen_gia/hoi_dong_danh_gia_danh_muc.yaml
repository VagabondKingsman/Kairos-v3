    3. **Cẩm nang Tái cân bằng (Rebalancing Playbook)** — Cuốn Kinh Thánh (Playbook) Tác chiến: Dò đúng Khung Giờ (Windows), Kích hoạt Phân bổ lại Theo Lệnh Ngưỡng (Threshold Triggers), Trình tự Mở Lệnh/Đóng Lệnh (Execution Order), và Lưu ý Chống Rủi Ro.
    4. **Ngân sách Rủi ro Bản Mới (Updated Risk Budget)** — Ấn định lại Lằn Ranh Mức Cắt Rủi Ro (Risk Cap) cho từng Vị thế sau khi trừ bì Kế hoạch Rủi ro Toàn cục; Nắn lại Hệ thống Giám sát Rủi ro.
    5. **Trọng tâm Giám sát Kỳ Tới (Forward-Looking Watchlist)** — Đặt ra 3-5 KPI Cốt lõi hoặc Vị thế cần theo dõi đặc biệt (High-alert) làm kim chỉ nam cho Đợt Đánh Giá {review_period} Mùa Kế Tiếp.

    Sử dụng load_skill("asset-allocation") để kích hoạt Khung Cắt/Phân Bổ Vị Thế; load_skill("risk-analysis") để Set Ngân Sách Rủi Ro Mới Định Dạng Tái Cân.
  tools: [bash, read_file, write_file, load_skill]
  skills: [asset-allocation, risk-analysis]
  max_iterations: 50
  timeout_seconds: 600
  max_retries: 1

tasks:
- id: task-attribution
  agent_id: attribution_analyst
  prompt_template: "Phân Tách Hiệu Suất (Performance Attribution) cho Danh mục {portfolio} trong kỳ {review_period}, xoáy sâu vào Trọng tâm: {goal}."
  depends_on: []

- id: task-risk
  agent_id: risk_inspector
  prompt_template: "Kiểm tra Tình trạng Rủi ro (Risk Inspection) của Danh mục {portfolio} trong kỳ {review_period}, bám sát Mục tiêu Đánh giá: {goal}."
  depends_on: []

- id: task-execution
  agent_id: execution_analyst
  prompt_template: "Phân Tích Chất Lượng Thực Thi (Execution Quality) cho Danh mục {portfolio} xuyên suốt kỳ {review_period}, làm rõ hao hụt Lợi nhuận liên quan tới {goal}."
  depends_on: []

- id: task-cio-decision
  agent_id: chief_investment_officer
  prompt_template: "Chủ Trì Hội Đồng Đánh Giá Danh Mục {review_period} cho {portfolio}; Dung hợp Cả 3 Báo Cáo Phân Tách (Hiệu Suất, Rủi Ro, Thực Thi) thành Bản Lệnh Điều Động Vốn Tái Cân Bằng. Giải quyết rốt ráo mục tiêu: {goal}."
  depends_on: [task-attribution, task-risk, task-execution]
  input_from:
    attribution_report: task-attribution
    risk_report: task-risk
    execution_report: task-execution

variables:
- name: portfolio
  description: "Tên hay Mô tả Danh mục Đầu tư (Ví dụ: Danh Mục Hỗn Hợp Giá Trị/Tăng Trưởng, Rổ Tăng Cường Tín Hiệu CSI 300)"
  required: true
- name: review_period
  description: "Chu kỳ Đánh giá (Ví dụ: Tháng/Quý/Bán Niên)"
  required: true
- name: goal
  description: "Trọng tâm Kỳ Đánh giá Này (Ví dụ: Kiểm Thẩm Định Hiệu Suất Q1, Chẩn Đoán Căn Bệnh Gây Sụt Giảm NAV Gần Đây)"
  required: true
