  prompt_template: "Phân tích trạng thái Thị trường Cổ phiếu Hạng A hiện tại tập trung vào mục tiêu: {goal}. Trình bày Quan điểm Luân chuyển Ngành (Sector Rotation), Tín hiệu Dòng vốn Ngoại (Northbound Flows), và Đề xuất 3-5 Cổ phiếu Tiềm năng."
  depends_on: []

