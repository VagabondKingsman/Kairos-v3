  agent_id: crypto_analyst
  prompt_template: "Phân tích các Tài sản Crypto cốt lõi tập trung vào mục tiêu: {goal}. Phân tích Funding Rates, Dòng tiền Stablecoin, và Đề xuất 3-5 Setup Giao dịch Tốt nhất."
  depends_on: []

- id: task-ushk
