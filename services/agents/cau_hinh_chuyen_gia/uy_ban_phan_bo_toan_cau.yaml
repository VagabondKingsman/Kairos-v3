variables:
- name: goal
  description: "Mục tiêu Đầu tư (Ví dụ: Định vị Phân bổ Đa tài sản Toàn cầu Q2/2026)"
  required: true
- name: risk_tolerance
  description: "Khẩu vị Rủi ro của Danh mục (Thận trọng / Cân bằng / Tấn công)"
  required: false
