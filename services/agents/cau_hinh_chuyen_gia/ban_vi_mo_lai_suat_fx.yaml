variables:
- name: goal
  description: "Mục tiêu Đầu tư Vĩ mô (Ví dụ: Định vị Phân bổ Đa tài sản Q2/2026, Giao dịch theo Chu kỳ Lãi suất)"
  required: true
- name: timeframe
  description: "Khung thời gian Đầu tư (Chiến thuật/Tactical: 1-3 tháng | Chiến lược/Strategic: 6-12 tháng)"
  required: true
