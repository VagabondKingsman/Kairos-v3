  description: "Mã Giao dịch (Ví dụ: VN30F1M, BTCUSDT, VCB, AAPL)"
  required: true
- name: timeframe
  description: "Khung Thời gian (Ví dụ: 1D, 4H, 1H, 15M)"
  required: true
