variables:
- name: market
  description: "Trụ Đo Khung (Ví Dụ Cụ Trọng: Sàn Đấu Trái Phiếu Chuyển Đổi Trung Quốc A-Share CBs, Bàn Giao Dịch CBs Dòng Ngân Hàng Kéo Mỹ Lõi Trụ Định Sống US Convertibles)"
  required: true
- name: goal
  description: "Bấm Đích Chặn Tìm Mồi (Ví Dụ Chọn Mã Vượt Undervalued Bọc Nghẽn Rẻ, Găm Kẹp Dò Áp Lực Công Ty Bị Ép Kẹt Vốn Mở Reset Hạ Cửa Chuyển Khớp Rẻ, Đu Theo Gió Vọt Kéo Hàng Tech Đang Hót Bức Bay)"
  required: true
- name: strategy_type
  description: "Phái Mảng Nút Bấm Khớp (Đánh Tầm Low-Price Double Dip Dưới Sàn Vớt Nền Hay High-Convexity Bắt Nhấn Phi Trượt Đẩy Sóng Cong Ăn Lõi Bốc Lên Delta To Bứt Phá Lướt Mức Căng? - Để Trống Tùy Ý Strategist Chọn Phím Đẩy)"
  required: false
